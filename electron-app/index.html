<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>electron-app</title>
    <style>
      #boot-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 80% at 50% -10%,#1e1b4b 0%,#020617 52%,#000 100%);z-index:9999;opacity:1;transition:opacity .28s ease}
      #boot-splash.hide{opacity:0;pointer-events:none}
      #boot-splash .ring{width:86px;height:86px;border-radius:9999px;border:2px solid rgba(99,102,241,.35);border-top-color:rgba(56,189,248,.95);animation:spin 1s linear infinite;box-shadow:0 0 22px rgba(99,102,241,.45)}
      #boot-splash .txt{margin-top:16px;color:#c7d2fe;font:600 13px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.08em}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="ring"></div>
        <div class="txt">系统启动中...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
